# ===========================================
# PRODUCTION DOCKER COMPOSE CONFIGURATION
# ===========================================

services:
  # ===== POSTGRESQL DATABASE =====
  postgres:
    image: postgres:15-alpine
    container_name: ciber-postgres-prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/backups:/backups
    networks:
      - ciber-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # ===== REDIS CACHE =====
  redis:
    image: redis:7-alpine
    container_name: ciber-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ciber-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

  # ===== BACKEND API =====
  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
      target: production
    container_name: ciber-backend-prod
    environment:
      APP_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN_MINUTES: ${JWT_EXPIRES_IN_MINUTES:-15}
      JWT_REFRESH_EXPIRES_IN_DAYS: ${JWT_REFRESH_EXPIRES_IN_DAYS:-7}
      JWT_MAX_SESSION_HOURS: ${JWT_MAX_SESSION_HOURS:-24}
      JWT_INACTIVITY_MINUTES: ${JWT_INACTIVITY_MINUTES:-60}
      MAX_SESSIONS_PER_USER: ${MAX_SESSIONS_PER_USER:-5}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost"]}
      EXECUTOR_SERVICE_URL: http://executor:5000
      EXECUTOR_SECRET: ${EXECUTOR_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
      GLITCHTIP_INTERNAL_URL: ${GLITCHTIP_INTERNAL_URL:-http://ciber-glitchtip:8000}
      GLITCHTIP_API_TOKEN: ${GLITCHTIP_API_TOKEN:-}
      GLITCHTIP_WEBHOOK_SECRET: ${GLITCHTIP_WEBHOOK_SECRET:-}
      INCIDENT_STORAGE_DIR: /app/incidents
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:4000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ciber-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ===== CODE EXECUTOR SERVICE =====
  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
      target: production
    container_name: ciber-executor-prod
    environment:
      NODE_ENV: production
      PORT: 5000
      DOCKER_HOST: unix:///var/run/docker.sock
      SANDBOX_TIMEOUT: ${SANDBOX_TIMEOUT:-30000}
      SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-256m}
      SANDBOX_CPU_LIMIT: ${SANDBOX_CPU_LIMIT:-1}
      SANDBOX_NETWORK_DISABLED: ${SANDBOX_NETWORK_DISABLED:-true}
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      EXECUTOR_SECRET: ${EXECUTOR_SECRET}
      ALLOWED_ORIGINS: ${EXECUTOR_ALLOWED_ORIGINS:-http://localhost:4000}
    ports:
      - "127.0.0.1:${EXECUTOR_PORT:-5000}:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ciber-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # ===== FRONTEND REACT =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_EXECUTOR_URL: ${VITE_EXECUTOR_URL}
    container_name: ciber-frontend-prod
    environment:
      NODE_ENV: production
    networks:
      - ciber-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ===== NGINX REVERSE PROXY =====
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ciber-nginx-prod
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - executor
    networks:
      - ciber-network
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

# ===== VOLUMES =====
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

# ===== NETWORK =====
networks:
  ciber-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
