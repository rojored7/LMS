# ===========================================
# PROMETHEUS CONFIGURATION
# ===========================================
# Configuración de scraping para todos los servicios
# y exporters de métricas
# ===========================================

global:
  scrape_interval: 15s  # Frecuencia de recolección
  evaluation_interval: 15s  # Frecuencia de evaluación de alertas
  scrape_timeout: 10s

  # Labels externos (útil para federación)
  external_labels:
    cluster: 'ciber-platform'
    environment: '${ENVIRONMENT:-production}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Reglas de alertas
rule_files:
  - 'alerts.yml'

# Configuración de scraping
scrape_configs:
  # ==========================================
  # PROMETHEUS SELF-MONITORING
  # ==========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ==========================================
  # APPLICATION METRICS - BACKEND API
  # ==========================================
  - job_name: 'backend-api'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'backend:4000'
          - 'backend-blue:4000'
          - 'backend-green:4000'
        labels:
          service: 'backend'
          app: 'ciber-platform'

  # ==========================================
  # CODE EXECUTOR SERVICE
  # ==========================================
  - job_name: 'executor'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'executor:5000'
          - 'executor-blue:5000'
          - 'executor-green:5000'
        labels:
          service: 'executor'
          app: 'ciber-platform'

  # ==========================================
  # NODE EXPORTER - System Metrics
  # ==========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          instance: 'production-server'

  # ==========================================
  # POSTGRES EXPORTER - Database Metrics
  # ==========================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'
          database: 'ciber_platform'

  # ==========================================
  # REDIS EXPORTER - Cache Metrics
  # ==========================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # ==========================================
  # CADVISOR - Container Metrics
  # ==========================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'

  # ==========================================
  # NGINX - Reverse Proxy Metrics (si se habilita)
  # ==========================================
  # Requiere nginx-prometheus-exporter
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']
  #       labels:
  #         service: 'nginx'

  # ==========================================
  # BLACKBOX EXPORTER - Uptime Monitoring (opcional)
  # ==========================================
  # Requiere blackbox-exporter para probes HTTP/TCP
  # - job_name: 'blackbox'
  #   metrics_path: '/probe'
  #   params:
  #     module: [http_2xx]
  #   static_configs:
  #     - targets:
  #         - http://frontend:80
  #         - http://backend:4000/health
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: [__param_target]
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: blackbox-exporter:9115

# ===========================================
# REMOTE WRITE (opcional - para Prometheus remoto)
# ===========================================
# Descomentar si quieres enviar métricas a Grafana Cloud
# u otro Prometheus remoto
#
# remote_write:
#   - url: https://prometheus-prod-10-prod-us-central-0.grafana.net/api/prom/push
#     basic_auth:
#       username: your_username
#       password: your_api_key
