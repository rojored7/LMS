services:
  # ===== BASE DE DATOS POSTGRESQL =====
  postgres:
    image: postgres:15-alpine
    container_name: ciber-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-ciber_platform}
      POSTGRES_USER: ${DB_USER:-ciber_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es requerido en .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_ES.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-scripts:/docker-entrypoint-initdb.d:ro
      - ./database/backups:/backups
    ports:
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    networks:
      - ciber-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ciber_admin} -d ${DB_NAME:-ciber_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===== REDIS PARA CACHE Y SESIONES =====
  redis:
    image: redis:7-alpine
    container_name: ciber-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD es requerido en .env}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    networks:
      - ciber-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ===== BACKEND API (FastAPI) =====
  backend:
    build:
      context: ./backend-fastapi
      dockerfile: Dockerfile
      target: ${APP_ENV:-development}
    container_name: ciber-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-ciber_admin}:${DB_PASSWORD:?DB_PASSWORD requerido en .env}@postgres:5432/${DB_NAME:-ciber_platform}
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD requerido en .env}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN_MINUTES: ${JWT_EXPIRES_IN_MINUTES:-15}
      JWT_REFRESH_EXPIRES_IN_DAYS: ${JWT_REFRESH_EXPIRES_IN_DAYS:-7}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost"]'
      EXECUTOR_SERVICE_URL: http://executor:5000
      EXECUTOR_SECRET: ${EXECUTOR_SECRET:?EXECUTOR_SECRET requerido en .env}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@ciberplatform.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend-fastapi/app:/app/app:delegated
      - ./backend-fastapi/alembic:/app/alembic:delegated
      - ..:/content:ro
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ciber-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ===== CODE EXECUTOR SERVICE =====
  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
      target: ${APP_ENV:-development}
    container_name: ciber-executor
    environment:
      NODE_ENV: ${APP_ENV:-development}
      PORT: 5000
      DOCKER_HOST: unix:///var/run/docker.sock
      SANDBOX_TIMEOUT: ${SANDBOX_TIMEOUT:-30000}
      SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-256m}
      SANDBOX_CPU_LIMIT: ${SANDBOX_CPU_LIMIT:-1}
      SANDBOX_NETWORK_DISABLED: ${SANDBOX_NETWORK_DISABLED:-true}
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD requerido en .env}@redis:6379
      EXECUTOR_SECRET: ${EXECUTOR_SECRET:?EXECUTOR_SECRET requerido en .env}
      ALLOWED_ORIGINS: ${EXECUTOR_ALLOWED_ORIGINS:-http://localhost:4000}
    ports:
      - "127.0.0.1:${EXECUTOR_PORT:-5000}:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./executor/src:/app/src:delegated
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ciber-network
    command: npm run dev
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # ===== FRONTEND REACT =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
    container_name: ciber-frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_EXECUTOR_URL: http://localhost:5000
      VITE_API_TIMEOUT: 30000
      VITE_ENV: ${NODE_ENV:-development}
      WDS_SOCKET_PORT: 0
      WATCHPACK_POLLING: true
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - /app/node_modules
    networks:
      - ciber-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ===== NGINX REVERSE PROXY =====
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ciber-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - executor
    networks:
      - ciber-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== CONTENT IMPORTER (ejecutar manualmente) =====
  importer:
    build:
      context: ./content-importer
      dockerfile: Dockerfile
    container_name: ciber-importer
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-ciber_admin}:${DB_PASSWORD:?DB_PASSWORD requerido en .env}@postgres:5432/${DB_NAME:-ciber_platform}?schema=public
      CONTENT_PATH: /content
    volumes:
      - ..:/content:ro
      - ./content-importer/src:/app/src:delegated
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ciber-network
    profiles:
      - tools
    command: npm run seed:help

# ===== VOLÚMENES PERSISTENTES =====
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

# ===== RED INTERNA =====
networks:
  ciber-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
