name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite deployment manual

jobs:
  test:
    name: Run CI Tests
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: success()

    outputs:
      git-sha: ${{ steps.meta.outputs.git-sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "git-sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./plataforma/backend
          file: ./plataforma/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/backend:buildcache,mode=max
          target: production

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./plataforma/frontend
          file: ./plataforma/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/frontend:buildcache,mode=max
          target: production

      - name: Build and Push Executor
        uses: docker/build-push-action@v4
        with:
          context: ./plataforma/executor
          file: ./plataforma/executor/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/executor:${{ github.sha }}
            ghcr.io/${{ github.repository }}/executor:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/executor:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/executor:buildcache,mode=max
          target: production

      - name: Image scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create deployment environment file
        run: |
          cat > deployment.env <<EOF
          GITHUB_REPOSITORY=${{ github.repository }}
          GITHUB_SHA=${{ github.sha }}
          GITHUB_ACTOR=${{ github.actor }}
          GITHUB_RUN_ID=${{ github.run_id }}
          GITHUB_RUN_NUMBER=${{ github.run_number }}
          DEPLOYMENT_TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          EOF

      - name: Copy deployment files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "plataforma/scripts/*,deployment.env"
          target: "/tmp/deployment-${{ github.sha }}"

      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        timeout-minutes: 15
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "════════════════════════════════════════════════════"
            echo "🚀 Starting Deployment to Production"
            echo "════════════════════════════════════════════════════"
            echo "Repository: ${{ github.repository }}"
            echo "Commit: ${{ github.sha }}"
            echo "Actor: ${{ github.actor }}"
            echo "════════════════════════════════════════════════════"

            # Navigate to project directory
            cd /opt/plataforma

            # Pull latest code
            echo "📥 Pulling latest code..."
            git pull origin main

            # Copy deployment metadata
            cp /tmp/deployment-${{ github.sha }}/deployment.env .

            # Make scripts executable
            chmod +x scripts/*.sh

            # Export environment variables for deployment
            export GITHUB_REPOSITORY="${{ github.repository }}"
            export GITHUB_SHA="${{ github.sha }}"

            # Run blue-green deployment
            echo "🔄 Starting blue-green deployment..."
            ./scripts/blue-green-deploy.sh --env=production

            # Cleanup temp files
            rm -rf /tmp/deployment-${{ github.sha }}

            echo "════════════════════════════════════════════════════"
            echo "✅ Deployment completed successfully!"
            echo "════════════════════════════════════════════════════"

      - name: Health Check Post-Deployment
        run: |
          echo "🏥 Running health checks..."

          # Wait 10 seconds for services to stabilize
          sleep 10

          # Check backend health
          if curl -f https://${{ secrets.PROD_SERVER_HOST }}/health/ready; then
            echo "✓ Backend is healthy"
          else
            echo "✗ Backend health check failed"
            exit 1
          fi

          # Check frontend
          if curl -f https://${{ secrets.PROD_SERVER_HOST }}; then
            echo "✓ Frontend is accessible"
          else
            echo "✗ Frontend is not accessible"
            exit 1
          fi

          echo "✅ All health checks passed!"

      - name: Notify Success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "✅ *Deployment to Production Successful*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Deployment Successful"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n`${{ github.sha }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployed by:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Time:*\n$(date -u +\"%Y-%m-%d %H:%M:%S UTC\")"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "View logs: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions>"
                  }
                }
              ]
            }'

      - name: Notify Failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "🚨 *Deployment to Production FAILED*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Deployment Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n`${{ github.sha }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployed by:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Time:*\n$(date -u +\"%Y-%m-%d %H:%M:%S UTC\")"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ *Action Required:* Check logs and rollback if necessary\n\nView logs: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions>"
                  }
                }
              ]
            }'

  rollback-on-failure:
    name: Automatic Rollback
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Trigger Rollback
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/plataforma
            echo "🔄 Deployment failed, initiating automatic rollback..."
            ./scripts/rollback.sh --auto
            echo "✅ Rollback completed"

      - name: Notify Rollback
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "🔄 Automatic rollback executed due to deployment failure",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔄 *Automatic Rollback Executed*\n\nDeployment for commit `${{ github.sha }}` failed.\nSystem has been rolled back to previous stable version.\n\nInvestigate: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions>"
                  }
                }
              ]
            }'
