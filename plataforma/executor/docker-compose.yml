version: '3.8'

services:
  executor:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ciber-executor
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - SANDBOX_TIMEOUT=30000
      - SANDBOX_MEMORY_LIMIT=256m
      - SANDBOX_CPU_LIMIT=1
      - SANDBOX_NETWORK_DISABLED=true
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=5
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - executor-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ciber-executor-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - executor-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local

networks:
  executor-network:
    driver: bridge
