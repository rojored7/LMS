name: Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            plataforma/executor/package-lock.json
            plataforma/frontend/package-lock.json

      - name: Backend - Install Dependencies
        run: |
          cd plataforma/backend-fastapi
          pip install -e ".[dev]"

      - name: Backend - Lint (ruff)
        run: |
          cd plataforma/backend-fastapi
          ruff check .

      - name: Executor - Install Dependencies
        run: |
          cd plataforma/executor
          npm ci

      - name: Executor - Lint
        run: |
          cd plataforma/executor
          npm run lint

      - name: Executor - Type Check
        run: |
          cd plataforma/executor
          npm run type-check

      - name: Frontend - Install Dependencies
        run: |
          cd plataforma/frontend
          npm ci

      - name: Frontend - Lint
        run: |
          cd plataforma/frontend
          npm run lint

      - name: Frontend - Type Check
        run: |
          cd plataforma/frontend
          npm run type-check

  backend-tests:
    name: Backend Tests (FastAPI + pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_for_ci_minimum_32_chars
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd plataforma/backend-fastapi
          pip install -e ".[dev]"

      - name: Run Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password_for_ci_minimum_32_chars@localhost:5432/test_db
          JWT_SECRET: test-secret-for-ci-pipeline-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-minimum-32-chars-long
          REDIS_URL: redis://localhost:6379
          EXECUTOR_SECRET: test-executor-secret-16ch
          APP_ENV: test
        run: |
          cd plataforma/backend-fastapi
          alembic upgrade head

      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password_for_ci_minimum_32_chars@localhost:5432/test_db
          JWT_SECRET: test-secret-for-ci-pipeline-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-minimum-32-chars-long
          REDIS_URL: redis://localhost:6379
          EXECUTOR_SECRET: test-executor-secret-16ch
          APP_ENV: test
        run: |
          cd plataforma/backend-fastapi
          pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing -q --tb=short

      - name: Upload Backend Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./plataforma/backend-fastapi/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plataforma/frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd plataforma/frontend
          npm ci

      - name: Run Unit Tests
        run: |
          cd plataforma/frontend
          npm test -- --run --coverage

      - name: Upload Frontend Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./plataforma/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Start Services
        run: |
          cd plataforma
          docker compose -f docker-compose.test.yml up -d

      - name: Wait for Services
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4000/health; then
              echo "Backend ready"
              break
            fi
            [ $i -eq 30 ] && { echo "Backend failed to start"; docker compose -f plataforma/docker-compose.test.yml logs backend; exit 1; }
            sleep 2
          done
          for i in {1..30}; do
            if curl -sf http://localhost:3000; then
              echo "Frontend ready"
              break
            fi
            [ $i -eq 30 ] && { echo "Frontend failed to start"; exit 1; }
            sleep 2
          done

      - name: Install Playwright
        run: |
          cd plataforma
          npm install
          npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: |
          cd plataforma
          npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: plataforma/playwright-report/
          retention-days: 7

      - name: Stop Services
        if: always()
        run: |
          cd plataforma
          docker compose -f docker-compose.test.yml down -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executor npm audit
        run: |
          cd plataforma/executor
          npm audit --audit-level=high || true

      - name: Frontend npm audit
        run: |
          cd plataforma/frontend
          npm audit --audit-level=high || true

      - name: Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'plataforma'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, backend-tests, frontend-tests, e2e-tests, security-scan]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]]; then
            echo "Lint and type check failed"
            exit 1
          fi
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "Frontend tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All critical tests passed!"
