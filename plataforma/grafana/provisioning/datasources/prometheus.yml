# ===========================================
# GRAFANA DATASOURCES - AUTO-PROVISIONING
# ===========================================
# Datasources configurados automáticamente al iniciar Grafana
# ===========================================

apiVersion: 1

datasources:
  # Prometheus - Primary datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
    version: 1

  # PostgreSQL - Database metrics (opcional)
  # Descomentar si quieres queries directas a PostgreSQL desde Grafana
