# ===========================================
# NGINX UPSTREAM CONFIGURATION - DEVELOPMENT
# ===========================================
# Generated: Initial development setup
# Environment: development
# Last Updated: Never deployed
#
# ESTE ARCHIVO SERÁ SOBRESCRITO EN PRODUCCIÓN
# por scripts/blue-green-deploy.sh y scripts/rollback.sh
# ===========================================

# Backend API Server
upstream backend {
    # Desarrollo: Apunta al servicio 'backend' definido en docker-compose.yml
    server backend:4000 max_fails=3 fail_timeout=30s;

    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Frontend React Application
upstream frontend {
    # Desarrollo: Apunta al servicio 'frontend' definido en docker-compose.yml
    server frontend:3000 max_fails=3 fail_timeout=30s;

    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Code Executor Service
upstream executor {
    # Desarrollo: Apunta al servicio 'executor' definido en docker-compose.yml
    server executor:5000 max_fails=3 fail_timeout=30s;

    keepalive 16;
    keepalive_requests 50;
    keepalive_timeout 90s;
}

# ===========================================
# NOTAS DE DEPLOYMENT
# ===========================================
# En producción, este archivo será regenerado automáticamente
# para apuntar a:
#   - backend-blue:4000 o backend-green:4000
#   - frontend-blue:80 o frontend-green:80
#   - executor-blue:5000 o executor-green:5000
#
# El switch entre blue/green ocurre en segundos sin downtime.
# ===========================================
