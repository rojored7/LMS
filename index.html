                topics: ["Proyecto", "Demo", "Evaluación"],
                folder: "09_Proyecto_Final",
                contents: [
                    { type: "plantilla", name: "Template de Proyecto", file: "proyecto_template.md" }
                ]
            },
            {
                number: 10,
                title: "Seguridad en Sistemas Operativos",
                duration: "6 horas",
                progress: 100,
                description: "Linux hardening, SELinux, AppArmor, SSH, Auditd, PAM, patch management y HIDS (OSSEC/Wazuh).",
                topics: ["SELinux", "SSH", "Auditd", "PAM", "Patching", "AIDE", "Wazuh"],
                folder: "10_Seguridad_Sistemas_Operativos",
                contents: [
                    { type: "teoria", name: "Kernel Hardening", file: "01_kernel_hardening.md" },
                    { type: "teoria", name: "SSH Hardening", file: "02_ssh_hardening.md" },
                    { type: "teoria", name: "Auditd", file: "03_auditd.md" },
                    { type: "teoria", name: "PAM Authentication", file: "04_pam_authentication.md" },
                    { type: "teoria", name: "Patch Management", file: "05_patch_management.md" },

        ];

        let currentModule = null;

        function renderModules() {
            const grid = document.getElementById('modulesGrid');
            grid.innerHTML = modules.map(module => `
                <div class="module-card" onclick="showModuleDetails(${module.number})">
                    <div class="module-number">Módulo ${String(module.number).padStart(2, '0')}</div>
                    <div class="module-title">${module.title}</div>
                    <div class="module-duration">⏱️ ${module.duration}</div>
                    <div class="module-description">${module.description}</div>
                    <div class="module-topics">
                        ${module.topics.map(topic => `<span class="topic-tag">${topic}</span>`).join('')}
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${module.progress}%"></div>
                    </div>
                    <div style="margin-top: 8px; text-align: right; font-size: 0.9em; color: #667eea; font-weight: bold;">
                        ${module.progress}% completo
                    </div>
                    <div class="module-actions">
                        <button class="btn btn-primary" onclick="event.stopPropagation(); showModuleDetails(${module.number})">
                            Ver Contenido
                        </button>
                        <button class="btn btn-secondary" onclick="event.stopPropagation(); renderMarkdownFile('${module.folder}/README.md', 'README - ${module.title}')">
                            README
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function showModuleDetails(moduleNumber) {
            currentModule = modules.find(m => m.number === moduleNumber);
            const modal = document.getElementById('moduleModal');
            const modalContent = document.getElementById('modalContent');

            const teoriaItems = currentModule.contents.filter(c => c.type === 'teoria');
            const labItems = currentModule.contents.filter(c => c.type === 'lab');
            const otherItems = currentModule.contents.filter(c => c.type !== 'teoria' && c.type !== 'lab');

            modalContent.innerHTML = `
                <h2>Módulo ${String(currentModule.number).padStart(2, '0')}: ${currentModule.title}</h2>
                <p style="color: #666; margin: 15px 0;">${currentModule.description}</p>
                <div style="margin: 20px 0;">
                    <strong>⏱️ Duración:</strong> ${currentModule.duration} |
                    <strong>📊 Progreso:</strong> ${currentModule.progress}%
                </div>

                ${teoriaItems.length > 0 ? `
                <h3 style="margin-top: 30px; color: #667eea;">📚 Contenido Teórico</h3>
                <div class="content-list">
                    ${teoriaItems.map(item => `
                        <div class="content-item" onclick="renderMarkdownFile('${currentModule.folder}/teoria/${item.file}', '${item.name}')">
                            <div class="content-item-title">📄 ${item.name}</div>
                            <div class="content-item-desc">Click para leer el contenido</div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}

                ${labItems.length > 0 ? `
                <h3 style="margin-top: 30px; color: #667eea;">🔬 Laboratorios Prácticos</h3>
                <div class="content-list">
                    ${labItems.map(item => `
                        <div class="content-item" onclick="renderMarkdownFile('${currentModule.folder}/laboratorios/${item.file}', '${item.name}')">
                            <div class="content-item-title">🧪 ${item.name}</div>
                            <div class="content-item-desc">Lab hands-on - Click para ver instrucciones</div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}

                ${otherItems.length > 0 ? `
                <h3 style="margin-top: 30px; color: #667eea;">📋 Otros Recursos</h3>
                <div class="content-list">
                    ${otherItems.map(item => {
                        let subfolder = item.type === 'evaluacion' ? 'evaluacion' :
                                      item.type === 'plantilla' ? 'plantillas' : '';
                        return `
                        <div class="content-item" onclick="renderMarkdownFile('${currentModule.folder}/${subfolder}/${item.file}', '${item.name}')">
                            <div class="content-item-title">📑 ${item.name}</div>
                            <div class="content-item-desc">${item.type}</div>
                        </div>
                    `}).join('')}
                </div>
                ` : ''}
            `;

            modal.style.display = 'block';
        }

        function renderMarkdownFile(path, title) {
            const modal = document.getElementById('moduleModal');
            const modalContent = document.getElementById('modalContent');

            // Show loading
            modalContent.innerHTML = `
                <button class="back-button" onclick="showModuleDetails(${currentModule ? currentModule.number : 1})">
                    ← Volver al índice
                </button>
                <div class="loading">Cargando contenido</div>
            `;
            modal.style.display = 'block';

            // Use setTimeout to show loading animation
            setTimeout(() => {
                try {
                    // Obtener contenido del bundle
                    let content = obtenerContenido(path);

                    if (!content) {
                        throw new Error(`Archivo no encontrado en el bundle`);
                    }

                    // Convert markdown to HTML
                    const htmlContent = marked.parse(content);

                    // Render content
                    modalContent.innerHTML = `
                        <button class="back-button" onclick="${currentModule ? `showModuleDetails(${currentModule.number})` : 'closeModal()'}">
                            ← Volver ${currentModule ? 'al índice' : ''}
                        </button>
                        <div class="markdown-content">
                            ${htmlContent}
                        </div>
                    `;

                    // Highlight code blocks
                    modalContent.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });

                } catch (error) {
                    modalContent.innerHTML = `
                        <button class="back-button" onclick="${currentModule ? `showModuleDetails(${currentModule.number})` : 'closeModal()'}">
                            ← Volver
                        </button>
                        <div class="error-message">
                            <strong>Error al cargar el archivo</strong><br>
                            ${error.message}<br><br>
                            Ruta buscada: <code>${path}</code><br><br>
                            <strong>Solución:</strong><br>
                            1. Asegúrate de que existe el archivo <code>contenido_bundle.js</code><br>
                            2. Si acabas de agregar archivos nuevos, ejecuta:<br>
                            <code>python generar_bundle.py</code>
                        </div>
                    `;
                }
            }, 100);
        }

        function closeModal() {
            document.getElementById('moduleModal').style.display = 'none';
            currentModule = null;
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('moduleModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // Initialize
        renderModules();
    </script>
